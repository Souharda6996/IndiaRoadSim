<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Digital Twin - Live Satellite Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="ui-panel">
        <h1>Mumbai Digital Twin</h1>
        <p>Live Web Satellite Feed</p>
        <div class="stats">
            <div>Active Vehicles: <span id="veh-count">0</span></div>
            <div>Status: <span id="conn-status" class="connected">Connected</span></div>
        </div>
        <p class="instruction">Scroll to Zoom • Click & Drag to Pan</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- App JS -->
    <script src="/static/app.js"></script>
</body>

</html>
